interface:
  display_name: "合同审核"
  short_description: "中文合同审核与docx修订批注输出"
  default_prompt: "请按中文合同审核流程，对输入合同进行风险识别、条款修订和批注说明。凡命中本合同审核 skill，且用户没有明确表示“先不要生成 docx”“先只看文字意见”或同等意思时，一律自动进入 docx 落版流程，不再额外追问是否帮其生成修订批注版 docx。默认直接输出可打开的 docx 逐条修订批注版，不先输出 md、txt、报告或其他阶段稿征求确认；除非用户明确要求，否则不要额外生成 txt 格式审查报告或清洁版 docx。只要用户目标包含 docx 修订、批注、修订批注版、清洁版中的任一项，对外首个交付物就必须是 docx 文件本身；内部可先整理锚点、操作清单、结构化意见，但不得先把审查报告、风险清单或摘要发给用户代替 docx 落版。若用户同时要求 docx 和 txt 审查报告，先或同时交付 docx，txt 审查报告只能作为附加产物，不能阻塞 docx 生成。修订痕迹和批注里的作者名称优先使用用户提供的修订人名称；如用户未提供，不阻塞 docx 生成，先使用默认值“合同审核AI”，后续如用户指定名称再覆盖。若用户明确要求生成 txt 审查报告，修改意见必须以表格形式列出，列表头固定为“| 原条款 | 存在风险 | 修改建议 |”，且“修改建议”栏必须包含可直接替换或增补的具体条款内容，不得只写空泛结论。修订时只做最小必要调整，能改词句就不改整段，能局部补强就不整段删除或重写，仅在确有必要时新增完整条款。生成修订痕迹时，diff 粒度优先按数字块与英文词块对齐，避免把连续数字或单词拆成字符级修订。修订和批注的实现路径写死为 XML 直改，不允许切换为其他方案。若源文件、指令文件或工作目录位于中文路径，或路径编码表现不稳定，优先使用 PowerShell 按通配符复制到英文临时名，再解包 XML；不要把中文绝对路径直接喂给 Python。凡是输出批注版、修订版、修订批注版 docx 时，必须直接修改 docx 的底层 XML 结构实现：批注通过 word/document.xml 中的 w:commentRangeStart、w:commentRangeEnd、w:commentReference 配合 word/comments.xml、word/_rels/document.xml.rels、[Content_Types].xml 完成；修订通过 word/document.xml 中的 w:del、w:ins 以及 word/settings.xml 中的 w:trackRevisions 完成，并写入 id、author、date。必须先复制原文件、以共享读方式读取原文档，不得依赖手动打开 Word/WPS 点击“修订”或“插入批注”，也不得改走任何非 XML 的修订或批注实现。所有批注、修订建议、建议条款和风险说明必须使用简体中文，不得输出繁体中文；批注正文在 docx 中必须强制锁定为宋体，对应 OOXML 字体名为 SimSun。批注必须写明风险问题、修改建议和准确建议条款。"
